<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frequência Escolar</title>
<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{font-family:'DM Sans',sans-serif}
.tab-active{border-bottom:3px solid #1e40af;color:#1e40af;font-weight:600}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.toast{animation:slideIn .3s ease,fadeOut .3s ease 2.7s}
@keyframes slideIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
</style>
</head>
<body class="h-full bg-slate-50">
<div id="app" class="h-full w-full overflow-auto">
<header class="bg-white border-b border-slate-200 px-4 py-4 shadow-sm">
<div class="max-w-5xl mx-auto flex items-center justify-between">
<div>
<h1 class="text-xl font-bold text-slate-800">Frequência Escolar</h1>
<p class="text-sm text-slate-500">Escola Estadual</p>
</div>
<div class="flex items-center gap-2 bg-blue-50 px-3 py-1.5 rounded-lg">
<i data-lucide="users" class="w-4 h-4 text-blue-700"></i>
<span id="total-count" class="text-sm font-medium text-blue-700">0 registros</span>
</div>
</div>
</header>
<nav class="bg-white border-b border-slate-200 px-4">
<div class="max-w-5xl mx-auto flex gap-6">
<button onclick="switchTab('register')" id="tab-register" class="py-3 px-1 text-sm tab-active">Registrar Frequência</button>
<button onclick="switchTab('students')" id="tab-students" class="py-3 px-1 text-sm text-slate-500 hover:text-slate-700">Alunos</button>
<button onclick="switchTab('reports')" id="tab-reports" class="py-3 px-1 text-sm text-slate-500 hover:text-slate-700">Relatórios</button>
</div>
</nav>
<div id="toast" class="fixed top-4 right-4 z-50 hidden"></div>
<main class="max-w-5xl mx-auto p-4">
<div id="panel-register" class="fade-in">
<div class="bg-white rounded-xl border border-slate-200 p-5 mb-4">
<h2 class="font-semibold text-slate-700 mb-4 flex items-center gap-2"><i data-lucide="calendar-check" class="w-5 h-5 text-blue-600"></i> Registrar Presença</h2>
<div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-4">
<div><label for="reg-date" class="block text-xs font-medium text-slate-600 mb-1">Data</label><input type="date" id="reg-date" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
<div><label for="reg-serie" class="block text-xs font-medium text-slate-600 mb-1">Curso</label><select id="reg-serie" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"><option value="">Selecione</option><option value="1º Ano A - Técnico em Controle Ambiental">1º Ano A - Técnico em Controle Ambiental</option><option value="1º Ano A - Técnico em Guia Turismo">1º Ano A - Técnico em Guia Turismo</option><option value="1º Ano B - Técnico em Guia Turismo">1º Ano B - Técnico em Guia Turismo</option><option value="2º Ano A - Técnico em Controle Ambiental">2º Ano A - Técnico em Controle Ambiental</option><option value="2º Ano B - Técnico em Controle Ambiental">2º Ano B - Técnico em Controle Ambiental</option><option value="3º Ano A - Parcial">3º Ano A - Parcial</option><option value="3º Ano B - Parcial">3º Ano B - Parcial</option></select></div>
<div><label for="reg-turma" class="block text-xs font-medium text-slate-600 mb-1">Turma</label><select id="reg-turma" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"><option value="">Selecione</option><option value="Única">Única</option></select></div>
</div>
<button onclick="loadStudentsForAttendance()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition"><i data-lucide="search" class="w-4 h-4 inline-block mr-1"></i> Carregar Alunos</button>
</div>
<div id="attendance-list" class="hidden bg-white rounded-xl border border-slate-200 p-5 fade-in">
<div class="flex items-center justify-between mb-4">
<h3 class="font-semibold text-slate-700">Lista de Chamada</h3>
<button onclick="saveAttendance()" id="btn-save-attendance" class="bg-green-600 hover:bg-green-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition"><i data-lucide="save" class="w-4 h-4 inline-block mr-1"></i> Salvar Frequência</button>
</div>
<div id="attendance-items" class="space-y-2"></div>
<p id="no-students-msg" class="text-sm text-slate-400 text-center py-6 hidden">Nenhum aluno cadastrado nesta turma.</p>
</div>
</div>
<div id="panel-students" class="hidden fade-in">
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
<div class="bg-white rounded-xl border border-slate-200 p-5">
<h2 class="font-semibold text-slate-700 mb-4 flex items-center gap-2"><i data-lucide="user-plus" class="w-5 h-5 text-blue-600"></i> Adicionar Aluno</h2>
<form onsubmit="addStudent(event)" class="space-y-3">
<div><label for="st-name" class="block text-xs font-medium text-slate-600 mb-1">Nome do Aluno</label><input type="text" id="st-name" required placeholder="Nome completo" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></div>
<div class="grid grid-cols-2 gap-2">
<div><label for="st-serie" class="block text-xs font-medium text-slate-600 mb-1">Curso</label><select id="st-serie" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"><option value="">Selecione</option><option value="1º Ano A - Técnico em Controle Ambiental">1º Ano A - Técnico em Controle Ambiental</option><option value="1º Ano A - Técnico em Guia Turismo">1º Ano A - Técnico em Guia Turismo</option><option value="1º Ano B - Técnico em Guia Turismo">1º Ano B - Técnico em Guia Turismo</option><option value="2º Ano A - Técnico em Controle Ambiental">2º Ano A - Técnico em Controle Ambiental</option><option value="2º Ano B - Técnico em Controle Ambiental">2º Ano B - Técnico em Controle Ambiental</option><option value="3º Ano A - Parcial">3º Ano A - Parcial</option><option value="3º Ano B - Parcial">3º Ano B - Parcial</option></select></div>
<div><label for="st-turma" class="block text-xs font-medium text-slate-600 mb-1">Turma</label><select id="st-turma" required class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"><option value="">Selecione</option><option value="Única">Única</option></select></div>
</div>
<button type="submit" id="btn-add-student" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition"><i data-lucide="plus" class="w-4 h-4 inline-block mr-1"></i> Adicionar</button>
</form>
</div>
</div>
<div class="bg-white rounded-xl border border-slate-200 p-5">
<h3 class="font-semibold text-slate-700 mb-4">Alunos Cadastrados</h3>
<div id="student-list" class="space-y-2"></div>
<p id="no-students" class="text-sm text-slate-400 text-center py-6 hidden">Nenhum aluno cadastrado ainda.</p>
</div>
</div>
<div id="panel-reports" class="hidden fade-in">
<div class="bg-white rounded-xl border border-slate-200 p-5 mb-4">
<h2 class="font-semibold text-slate-700 mb-4 flex items-center gap-2"><i data-lucide="bar-chart-3" class="w-5 h-5 text-blue-600"></i> Relatório de Frequência</h2>
<button onclick="generateReport()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition"><i data-lucide="file-text" class="w-4 h-4 inline-block mr-1"></i> Gerar Relatório</button>
</div>
<div id="report-results" class="hidden bg-white rounded-xl border border-slate-200 p-5 fade-in">
<div id="report-summary" class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4"></div>
<div id="report-table" class="overflow-x-auto"></div>
</div>
</div>
</main>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, set, get, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDWCezAji-Dy-73RiUB9-AdTSdFSVYIHro",
  authDomain: "frequencia-escolar-pedroii.firebaseapp.com",
  databaseURL: "https://frequencia-escolar-pedroii-default-rtdb.firebaseio.com",
  projectId: "frequencia-escolar-pedroii",
  storageBucket: "frequencia-escolar-pedroii.firebasestorage.app",
  messagingSenderId: "356639139556",
  appId: "1:356639139556:web:ea2659a10315baf11feef1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const alunosRef = ref(db, "alunos");
const frequenciasRef = ref(db, "frequencias");

let alunos = [];
let frequencias = {};

function showToast(msg,type='success'){
const el=document.getElementById('toast');
const color=type==='success'?'bg-green-600':'bg-red-600';
el.innerHTML=`<div class="toast ${color} text-white px-4 py-2 rounded-lg shadow-lg text-sm">${msg}</div>`;
el.classList.remove('hidden');
setTimeout(()=>el.classList.add('hidden'),3000);
}

window.switchTab = function(tab){
['register','students','reports'].forEach(t=>{
document.getElementById(`panel-${t}`).classList.toggle('hidden',t!==tab);
document.getElementById(`tab-${t}`).classList.toggle('tab-active',t===tab);
});
if(tab==='students')renderStudentList();
}

window.addStudent = function(e){
e.preventDefault();
const nome=document.getElementById('st-name').value.trim();
const serie=document.getElementById('st-serie').value;
const turma=document.getElementById('st-turma').value;
if(!nome||!serie||!turma)return;
push(alunosRef,{nome,serie,turma});
document.getElementById('st-name').value='';
showToast('Aluno adicionado!');
}

onValue(alunosRef,(snapshot)=>{
const data=snapshot.val()||{};
alunos=Object.entries(data).map(([id,v])=>({id,...v}));
document.getElementById('total-count').textContent=`${alunos.length} registros`;
renderStudentList();
});

function renderStudentList(){
const container=document.getElementById('student-list');
const noMsg=document.getElementById('no-students');
if(alunos.length===0){container.innerHTML='';noMsg.classList.remove('hidden');return;}
noMsg.classList.add('hidden');
container.innerHTML=alunos.map(a=>`
<div class="flex items-center justify-between border border-slate-100 rounded-lg px-3 py-2">
<div><span class="font-medium text-slate-700 text-sm">${a.nome}</span>
<span class="ml-2 text-xs text-slate-400">${a.serie} - Turma ${a.turma}</span></div>
<button onclick="deleteStudent('${a.id}')" class="text-red-500 hover:text-red-700 text-xs flex items-center gap-1"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i>Remover</button>
</div>`).join('');
lucide.createIcons();
}

window.deleteStudent = function(id){
remove(ref(db,`alunos/${id}`));
showToast('Aluno removido.');
}

window.loadStudentsForAttendance = function(){
const date=document.getElementById('reg-date').value;
const serie=document.getElementById('reg-serie').value;
const turma=document.getElementById('reg-turma').value;
if(!date||!serie||!turma){showToast('Preencha todos os campos','error');return;}
const listDiv=document.getElementById('attendance-list');
const container=document.getElementById('attendance-items');
const noMsg=document.getElementById('no-students-msg');
const alunosTurma=alunos.filter(a=>a.serie===serie&&a.turma===turma);
listDiv.classList.remove('hidden');
if(alunosTurma.length===0){container.innerHTML='';noMsg.classList.remove('hidden');return;}
noMsg.classList.add('hidden');
const turmaRef=ref(db,`frequencias/${date}/${serie}/${turma}`);
get(turmaRef).then(snap=>{
const data=snap.val()||{};
container.innerHTML=alunosTurma.map((a,i)=>{
const checked=data[a.nome]===true?'checked':'';
return `<div class="flex items-center justify-between border border-slate-100 rounded-lg px-3 py-2">
<div class="flex items-center gap-3"><span class="text-xs text-slate-400 w-5">${i+1}</span>
<span class="text-sm font-medium text-slate-700">${a.nome}</span></div>
<label class="flex items-center gap-2 cursor-pointer"><span class="text-xs text-slate-500">Presente</span>
<input type="checkbox" data-student="${a.nome}" ${checked} class="w-4 h-4 accent-green-600 rounded"></label></div>`;
}).join('');
lucide.createIcons();
});
}

window.saveAttendance = function(){
const date=document.getElementById('reg-date').value;
const serie=document.getElementById('reg-serie').value;
const turma=document.getElementById('reg-turma').value;
const checkboxes=document.querySelectorAll('#attendance-items input[type="checkbox"]');
const lista={};
checkboxes.forEach(cb=>{lista[cb.getAttribute('data-student')]=cb.checked;});
set(ref(db,`frequencias/${date}/${serie}/${turma}`),lista);
showToast('Frequência salva!');
}

onValue(frequenciasRef,(snapshot)=>{frequencias=snapshot.val()||{};});

window.generateReport = function(){
const resultsDiv=document.getElementById('report-results');
resultsDiv.classList.remove('hidden');
let total=0,present=0;
Object.values(frequencias).forEach(dias=>{
Object.values(dias).forEach(series=>{
Object.values(series).forEach(turmas=>{
Object.values(turmas).forEach(v=>{
total++;if(v===true)present++;
});
});
});
});
const absent=total-present;
const pct=total>0?((present/total)*100).toFixed(1):0;
document.getElementById('report-summary').innerHTML=`
<div class="bg-blue-50 rounded-lg p-3 text-center"><div class="text-2xl font-bold text-blue-700">${total}</div><div class="text-xs text-blue-600">Total</div></div>
<div class="bg-green-50 rounded-lg p-3 text-center"><div class="text-2xl font-bold text-green-700">${present}</div><div class="text-xs text-green-600">Presenças</div></div>
<div class="bg-red-50 rounded-lg p-3 text-center"><div class="text-2xl font-bold text-red-700">${absent}</div><div class="text-xs text-red-600">Faltas</div></div>
<div class="bg-purple-50 rounded-lg p-3 text-center"><div class="text-2xl font-bold text-purple-700">${pct}%</div><div class="text-xs text-purple-600">Frequência</div></div>`;
document.getElementById('report-table').innerHTML='<p class="text-sm text-slate-400 text-center py-4">Relatório geral gerado.</p>';
}

document.getElementById('reg-date').valueAsDate=new Date();
lucide.createIcons();
</script>
</body>
</html>
